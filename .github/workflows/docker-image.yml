name: Build, Push, and Deploy Docker Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker image and tag it
      - name: Build and tag Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/churn-predictor-api:latest .
          docker tag ${{ secrets.DOCKER_USERNAME }}/churn-predictor-api:latest ${{ secrets.DOCKER_USERNAME }}/churn-predictor-api:${{ github.sha }}

      # Push Docker image to Docker Hub
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/churn-predictor-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/churn-predictor-api:${{ github.sha }}
