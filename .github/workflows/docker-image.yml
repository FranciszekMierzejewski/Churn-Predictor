name: Build, Push, and Deploy Docker Image

on: # if pushed or merged to main
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps: # check repo code
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub # log in
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/churn-predictor-api:latest
            ${{ secrets.DOCKER_USERNAME }}/churn-predictor-api:${{ github.sha }}
